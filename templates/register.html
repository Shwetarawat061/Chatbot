<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CutiBot - Congratulations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container dark-theme padding-large">
        <div class="header-bar">
            <span class="back-btn">←</span> Create New Password
        </div>
        
        <div class="character-wrapper">
            <div class="character">
                <div class="hair-back"></div>
                <div class="hair-strand-left"></div>
                <div class="hair-strand-right"></div>
                <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="mouth happy-mouth"></div>
                </div>
                <div class="hair-front"></div>
                <div class="bangs"></div>
            </div>
        </div>

        <h2 class="success-title">Congratulations!</h2>

        <div class="form-group">
            <a href="index.html" style="text-decoration: none;">
                <button class="primary-btn">Start Chat</button>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
