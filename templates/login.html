<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CutiBot - Create Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container padding-large">
        <div class="header-bar">
            <span class="back-btn">←</span> Create New Password
        </div>
        
        <div class="character-wrapper" id="character-anim">
            <div class="character">
                <div class="hair-back"></div>
                <div class="hair-strand-left"></div>
                <div class="hair-strand-right"></div>
                <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="mouth default-mouth"></div>
                </div>
                <div class="hair-front"></div>
                <div class="bangs"></div>
            </div>
        </div>

        <div class="form-group">
            <input type="password" class="input-field" value="••••••••" placeholder="Password">
            <input type="password" id="confirm-pass" class="input-field" value="••••" placeholder="Confirm Password">
            <a href="register.html" style="text-decoration: none;">
                <button class="primary-btn">Continue</button>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
