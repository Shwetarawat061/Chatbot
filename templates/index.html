<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CutiBot - Active Chats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        <div class="chat-header">
            <span class="nav-icon">←</span>
            <strong>Active Chats</strong>
            <span class="nav-icon">⚙️</span>
        </div>

        <div class="chat-body" id="chat-box">
            <div class="chat-bubble bot-bubble">
                Hello Mia! I'm CutiBot 💗
            </div>
            <div class="chat-bubble bot-bubble">
                How are you today? 😊
            </div>
        </div>

        <div class="chat-footer">
            <input type="text" id="user-input" class="chat-input" placeholder="Type a message...">
            <button id="send-btn" class="send-btn">➔</button>
        </div>
    </div>

    <div class="demo-nav">
        <a href="login.html"><button>Go to Login</button></a>
        <a href="register.html"><button>Go to Register</button></a>
    </div>

    <script src="script.js"></script>
</body>
</html>
